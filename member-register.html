<title>고객회원가입</title>
  <link rel="stylesheet" href="common.css" />
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <style>
    body[data-page="member-register"] .hero-copy p{display:none;}
    body[data-page="member-register"] .phone-row{
      display:grid;
      grid-template-columns:1fr auto 1fr auto 1fr;
      gap:8px;
      align-items:center;
    }
    body[data-page="member-register"] .phone-row input{
      text-align:center;
    }
    body[data-page="member-register"] .phone-dash{
      color:#64748b;
      font-weight:800;
    }
    @media (max-width:900px){
      body[data-page="member-register"] .left-panel{
        min-height:230px;
        padding:26px 24px 22px;
        justify-content:center;
        gap:16px;
      }
      body[data-page="member-register"] .logo-img{
        max-width:210px;
      }
      body[data-page="member-register"] .hero-copy h1{
        margin:0;
        font-size:26px;
        line-height:1.22;
      }
      body[data-page="member-register"] .right-panel{
        padding-top:28px;
      }
    }
    @media (max-width:420px){
      body[data-page="member-register"] .left-panel{
        min-height:205px;
        padding:22px 24px 20px;
      }
      body[data-page="member-register"] .logo-img{
        max-width:185px;
      }
      body[data-page="member-register"] .hero-copy h1{
        font-size:24px;
      }
    }
  </style>
</head>
<body data-page="member-register">

  <main class="page">
    <section class="left-panel">
        <img class="logo-img" src="assets/logo/logo_w.png" alt="우리꺼 로고" />
      </div>

      <div class="hero-copy">
        <h1>우리 동네 가게를<br />더 가깝게 만나는 방법</h1>
      </div>
    </section>

    <section class="right-panel">
      <div class="card">
        <h2>통합회원가입</h2><br>

        <div class="notice-box" style="margin-top:18px;">
          회원가입을 하시면 상점서비스와 더 많은 혜택을 받을 수 있습니다.
        </div>

        <div class="divider">일반 회원가입</div>

        <form action="#" method="post">
          <div class="form-group">
            <label for="id">아이디</label>
            <input type="id" id="id" name="id" placeholder="영문+숫자" required />
          </div>
          
            <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="4자 이상 입력" required />
          </div>

          <div class="form-group">
            <label for="passwordConfirm">비밀번호 확인</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 재입력" required />
          </div>
       
          <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required />
          </div>

          <div class="form-group">
            <label for="phone">휴대폰 번호</label>
            <div class="phone-row">
              <input type="tel" id="phoneFirst" name="phoneFirst" value="010" maxlength="3" inputmode="numeric" required />
              <span class="phone-dash">-</span>
              <input type="tel" id="phoneMiddle" name="phoneMiddle" maxlength="4" inputmode="numeric" placeholder="0000" required />
              <span class="phone-dash">-</span>
              <input type="tel" id="phoneLast" name="phoneLast" maxlength="4" inputmode="numeric" placeholder="0000" required />
            </div>
          </div>
    
          <div class="form-group">
            <label for="address">주소</label>
            <input type="text" id="address" name="address" placeholder="클릭해서 도로명 주소 검색" onclick="openMemberAddressSearch()" readonly required />
          </div>

          <div class="form-group">
            <label for="addressDetail">상세주소</label>
            <input type="text" id="addressDetail" name="addressDetail" placeholder="동, 호수 등 상세주소 입력" required />
          </div>
          
          <label class="check-line">
            <input type="checkbox" required />
            우리꺼 이용약관 및 개인정보 처리방침에 동의합니다.
          </label>

          <label class="check-line">
            <input type="checkbox" />
            이벤트, 할인, 우리 동네 가게 소식 알림을 받겠습니다.
          </label>

          <button type="submit" class="btn btn-primary">
            일반 회원가입 완료
          </button>
        </form>

        <div class="footer-links">
          이미 회원이신가요?
          <a href="member-login.html" class="link-orange" id="memberLoginLink">로그인하기</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    function getRedirectUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('redirect') || localStorage.getItem('wooreccoMemberRedirect') || 'order.html';
    }

    const memberLoginLink = document.getElementById('memberLoginLink');
    if (memberLoginLink) {
      memberLoginLink.href = `member-login.html?redirect=${encodeURIComponent(getRedirectUrl())}`;
    }

    function getSignupStoreId() {
      try {
        const redirectUrl = new URL(getRedirectUrl(), window.location.origin);
        return redirectUrl.searchParams.get('store') || '';
      } catch (error) {
        return '';
      }
    }

    function saveMember(member) {
      const memberName = (member.name || member.id || '회원').trim();
      localStorage.setItem('wooreccoMemberName', memberName);
      localStorage.setItem('wooreccoMember', JSON.stringify({
        id: member.id || '',
        name: memberName,
        phone: member.phone || '',
        address: member.address || '',
        provider: member.provider || 'normal'
      }));
    }

    async function saveCustomerToServer(member) {
      const response = await fetch('/api/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...member,
          storeId: getSignupStoreId()
        })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result.ok) {
        throw new Error(result.message || '회원가입 정보를 저장하지 못했습니다.');
      }
      return result.customer;
    }

    async function completeSignup(member, message) {
      await saveCustomerToServer(member);
      saveMember(member);
      const redirectUrl = getRedirectUrl();
      localStorage.removeItem('wooreccoMemberRedirect');
      if (message) alert(message);
      window.location.href = redirectUrl;
    }

    let memberAddressSearchOpening = false;
    function openMemberAddressSearch() {
      if (memberAddressSearchOpening) return;
      if (!window.daum || !window.daum.Postcode) {
        alert('주소 검색을 준비하지 못했습니다. 잠시 후 다시 시도해주세요.');
        return;
      }

      memberAddressSearchOpening = true;
      new daum.Postcode({
        oncomplete: function(data) {
          const address = data.roadAddress || data.jibunAddress || '';
          const addressInput = document.getElementById('address');
          const detailInput = document.getElementById('addressDetail');
          if (addressInput) addressInput.value = address;
          if (detailInput) {
            detailInput.focus();
          }
          memberAddressSearchOpening = false;
        },
        onclose: function() {
          memberAddressSearchOpening = false;
        }
      }).open();
    }

    function keepOnlyDigits(input, maxLength) {
      input.value = input.value.replace(/\D/g, '').slice(0, maxLength);
    }

    const phoneFirstInput = document.getElementById('phoneFirst');
    const phoneMiddleInput = document.getElementById('phoneMiddle');
    const phoneLastInput = document.getElementById('phoneLast');

    phoneFirstInput?.addEventListener('input', function() {
      keepOnlyDigits(this, 3);
      if (this.value.length >= 3) phoneMiddleInput?.focus();
    });

    phoneMiddleInput?.addEventListener('input', function() {
      keepOnlyDigits(this, 4);
      if (this.value.length >= 4) phoneLastInput?.focus();
    });

    phoneLastInput?.addEventListener('input', function() {
      keepOnlyDigits(this, 4);
    });

    document.querySelector('form')?.addEventListener('submit', async function(event) {
      event.preventDefault();

      const name = document.getElementById('name')?.value.trim() || '';
      const id = document.getElementById('id')?.value.trim() || '';
      const password = document.getElementById('password')?.value.trim() || '';
      const passwordConfirm = document.getElementById('passwordConfirm')?.value.trim() || '';
      if (password !== passwordConfirm) {
        alert('비밀번호가 서로 다릅니다.');
        return;
      }
      const phoneFirst = document.getElementById('phoneFirst')?.value.trim() || '';
      const phoneMiddle = document.getElementById('phoneMiddle')?.value.trim() || '';
      const phoneLast = document.getElementById('phoneLast')?.value.trim() || '';
      const phone = [phoneFirst, phoneMiddle, phoneLast].join('-');
      const address = document.getElementById('address')?.value.trim() || '';
      const addressDetail = document.getElementById('addressDetail')?.value.trim() || '';
      const fullAddress = [address, addressDetail].filter(Boolean).join(' ');
      const submitButton = this.querySelector('button[type="submit"]');
      const originalText = submitButton ? submitButton.textContent : '';
      if (submitButton) {
        submitButton.disabled = true;
        submitButton.textContent = '가입 확인중...';
      }

      try {
        await completeSignup({
          id,
          password,
          name: name || id || '회원',
          phone,
          address: fullAddress,
          provider: 'normal'
        }, '회원가입이 완료되었습니다.');
      } catch (error) {
        alert(error.message || '회원가입 정보를 저장하지 못했습니다.');
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.textContent = originalText || '일반 회원가입 완료';
        }
      }
    });
  </script>
</body>
</html>
